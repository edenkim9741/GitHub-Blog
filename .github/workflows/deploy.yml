name: Zola on GitHub Pages

on:
  push:
    branches: [ main ] # main 브랜치에 푸시될 때마다 실행됩니다.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositoryj
        uses: actions/checkout@v4
        with:
          submodules: recursive # ✨가장 중요! book 테마를 가져오기 위한 설정입니다.
          
      - name: Zola Install
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1
          
      - name: Zola Build
        run: zola build
        
      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages Deployment
        id: deployment
        uses: actions/deploy-pages@v4